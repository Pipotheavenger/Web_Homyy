# Configuración del proyecto para SonarQube (SonarCloud)
sonar.projectKey=hommy_hommy
sonar.projectName=Web Homyy
sonar.projectVersion=1.0
sonar.organization=hommy

# URL de SonarCloud
sonar.host.url=https://sonarcloud.io

# Rutas de código fuente
sonar.sources=src
# No hay tests separados, así que no configuramos sonar.tests
# sonar.tests=src/test
sonar.sourceEncoding=UTF-8

# Exclusiones de archivos
sonar.exclusions=**/node_modules/**,**/dist/**,**/.next/**,**/build/**,**/coverage/**,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/scripts/**

# Inclusiones de archivos
sonar.inclusions=**/*.ts,**/*.tsx,**/*.js,**/*.jsx

# Configuración de TypeScript/JavaScript
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Configuración de ESLint
sonar.eslint.reportPaths=eslint-report.json

# NOTA: El token NO debe ir en este archivo por seguridad
# Configúralo como variable de entorno: SONAR_TOKEN
# O pásalo en el comando: -Dsonar.token=tu_token

